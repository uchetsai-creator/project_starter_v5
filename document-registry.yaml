  mcp-contract:
    file: mcp-contract.md
    path: specs/mcp-contract.md
    required_for: []
    optional_for: [llm-app]
    context_priority: medium
    purpose: "MCP server tool schemas, tool-use policy, and server configuration"
    used_by: [context-builder, validator, pdf]
