# document-registry.yaml — project_starter_v4
# Single source of truth for all document metadata.
# Replaces: verify_docs.py MATRIX + FILE_LOCATIONS, verify_content.py TYPE_DOCS + DOC_PATHS,
#           and templates/init/document-matrix.md (which is now a human-readable view only).
#
# Schema per entry:
#   file:             filename (with .md)
#   path:             path relative to docs/ root
#   required_for:     project types where this document is Required (R)
#   optional_for:     project types where this document is Optional (O)
#   context_priority: high | medium | low  (used by build-context.py)
#   purpose:          one-line description for AI context headers
#   used_by:          which tools consume this document
#   related:          closely related document keys (without .md)
#
# Valid project types (9):
#   web-app | cli-tool | library | data-pipeline | ml-pipeline
#   microservices | llm-app | iac | mobile-app
# Hybrid types: data-pipeline+web-app (union of both type entries)

documents:

  # ── Architecture ─────────────────────────────────────────────────────────────

  architecture:
    file: architecture.md
    path: architecture/architecture.md
    required_for: [web-app, cli-tool, data-pipeline, ml-pipeline, microservices, llm-app, mobile-app]
    optional_for: [library]
    context_priority: medium
    purpose: "Current system components and data-flow diagram"
    used_by: [context-builder, validator, pdf]
    related: [backend, database, deployment]

  backend:
    file: backend.md
    path: architecture/backend.md
    required_for: [web-app, cli-tool, data-pipeline, ml-pipeline]
    optional_for: [microservices, llm-app, mobile-app]
    context_priority: medium
    purpose: "Backend stack, layering, and module organisation"
    used_by: [context-builder, validator, pdf]
    related: [architecture, database]

  frontend:
    file: frontend.md
    path: architecture/frontend.md
    required_for: [mobile-app]
    optional_for: [web-app, microservices, llm-app]
    context_priority: medium
    purpose: "Frontend stack, page structure, and component strategy"
    used_by: [context-builder, validator, pdf]
    related: [architecture, permissions]

  database:
    file: database.md
    path: architecture/database.md
    required_for: [web-app, data-pipeline, ml-pipeline]
    optional_for: [cli-tool, microservices, llm-app, mobile-app]
    context_priority: medium
    purpose: "Database engine, main entities, and relationships"
    used_by: [context-builder, validator, pdf]
    related: [data-model, backend]

  deployment:
    file: deployment.md
    path: architecture/deployment.md
    required_for: [web-app, data-pipeline, ml-pipeline, microservices]
    optional_for: [llm-app]
    context_priority: medium
    purpose: "Services, environment variables, and build/deploy flow"
    used_by: [context-builder, validator, pdf]
    related: [architecture, quickstart]

  distribution:
    file: distribution.md
    path: architecture/distribution.md
    required_for: [cli-tool, library, mobile-app]
    optional_for: []
    context_priority: low
    purpose: "Package build, registry publish, and installation instructions"
    used_by: [context-builder, validator, pdf]
    related: [release-guide, compatibility-matrix]

  topology:
    file: topology.md
    path: architecture/topology.md
    required_for: [iac]
    optional_for: []
    context_priority: medium
    purpose: "Infrastructure resource topology and environment promotion path"
    used_by: [context-builder, validator, pdf]
    related: [runbook, drift-policy]

  # ── Specs ────────────────────────────────────────────────────────────────────

  api-contract:
    file: api-contract.md
    path: specs/api-contract.md
    required_for: [web-app, microservices]
    optional_for: [llm-app, mobile-app]
    context_priority: high
    purpose: "REST/GraphQL/WebSocket endpoint contracts, error codes, and validation rules"
    used_by: [context-builder, validator, pdf]
    related: [permissions, data-model]

  cli-contract:
    file: cli-contract.md
    path: specs/cli-contract.md
    required_for: [cli-tool]
    optional_for: [llm-app]
    context_priority: high
    purpose: "CLI subcommands, flags, arguments, output format, and exit codes"
    used_by: [context-builder, validator, pdf]
    related: [quickstart, release-guide]

  public-api:
    file: public-api.md
    path: specs/public-api.md
    required_for: [library]
    optional_for: []
    context_priority: high
    purpose: "Public functions, classes, types, and constants exposed to callers"
    used_by: [context-builder, validator, pdf]
    related: [compatibility-matrix, release-guide]

  pipeline-contract:
    file: pipeline-contract.md
    path: specs/pipeline-contract.md
    required_for: [data-pipeline, ml-pipeline]
    optional_for: []
    context_priority: high
    purpose: "Inter-stage input/output formats, paths, naming rules, and error handling"
    used_by: [context-builder, validator, pdf]
    related: [pipeline-debug, data-model]

  pipeline-debug:
    file: pipeline-debug.md
    path: specs/pipeline-debug.md
    required_for: [data-pipeline, ml-pipeline]
    optional_for: []
    context_priority: medium
    purpose: "Stage failure diagnosis guide: wrong row count, data quality, root cause"
    used_by: [context-builder, validator, pdf]
    related: [pipeline-contract]

  llm-contract:
    file: llm-contract.md
    path: specs/llm-contract.md
    required_for: [llm-app]
    optional_for: []
    context_priority: high
    purpose: "Model, system prompt, parameters, and tool schemas"
    used_by: [context-builder, validator, pdf]
    related: [prompt-library, eval-spec, rag-contract]

  prompt-library:
    file: prompt-library.md
    path: specs/prompt-library.md
    required_for: [llm-app]
    optional_for: []
    context_priority: high
    purpose: "Index of all prompts with version, purpose, and per-prompt file link"
    used_by: [context-builder, validator, pdf]
    related: [llm-contract, eval-spec]

  eval-spec:
    file: eval-spec.md
    path: specs/eval-spec.md
    required_for: [llm-app]
    optional_for: []
    context_priority: medium
    purpose: "Evaluation criteria, metrics, score thresholds, and dataset selection rules"
    used_by: [context-builder, validator, pdf]
    related: [llm-contract, eval-log]

  eval-log:
    file: eval-log.md
    path: specs/eval-log.md
    required_for: [llm-app]
    optional_for: []
    context_priority: low
    purpose: "Per-run evaluation results log (one row per eval run)"
    used_by: [context-builder, validator, pdf]
    related: [eval-spec]

  llm-debug:
    file: llm-debug.md
    path: specs/llm-debug.md
    required_for: [llm-app]
    optional_for: []
    context_priority: medium
    purpose: "LLM failure diagnosis guide: wrong answer, low eval score, tool call failure"
    used_by: [context-builder, validator, pdf]
