  rag-contract:
    file: rag-contract.md
    path: specs/rag-contract.md
    required_for: []
    optional_for: [llm-app]
    context_priority: medium
    purpose: "Retrieval sources, chunking strategy, embedding model, and vector store config"
    used_by: [context-builder, validator, pdf]
