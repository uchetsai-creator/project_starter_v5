# document-registry.yaml — project_starter_v5
# Single source of truth for all document metadata.
# Replaces: verify_docs.py MATRIX + FILE_LOCATIONS, verify_content.py TYPE_DOCS + DOC_PATHS,
#           build_pdf.py PDF_ALLOWLIST, and templates/init/document-matrix.md.
#
# Schema per entry (see templates/schema/document-registry.schema.json):
#   file:             filename (with .md)
#   path:             path relative to docs/ root
#   required_for:     project types where this document is Required (R)
#   optional_for:     project types where this document is Optional (O)
#   replaces_for:     optional — {type: replacement-doc-key} — for N/A types, the
#                     replacement document that serves the same purpose for that type
#   context_priority: high | medium | low  (used by build-context.py)
#   purpose:          one-line description for AI context headers
#   used_by:          which tools consume this document
#   related:          closely related document keys (without .md)
#   pdf:              true | false — include in generated PDF
#   pdf_chapter:      introduction | plan | design | build | test | deployment | null
#   audience:         internal | external — external = no task/sprint refs allowed
#   required_sections: section headings verify_content.py must find filled
#   update_trigger:   when to update this document
#
# Valid project types (9):
#   web-app | cli-tool | library | data-pipeline | ml-pipeline
#   microservices | llm-app | iac | mobile-app
# Hybrid types: data-pipeline+web-app (union of both type entries)

documents:

  # ── Plan ──────────────────────────────────────────────────────────────────────

  project-requirements:
    file: project-requirements.md
    path: project-requirements.md
    required_for: [web-app, cli-tool, library, data-pipeline, ml-pipeline, microservices, llm-app, iac, mobile-app]
    optional_for: []
    context_priority: high
    task_types: [feature, sprint-end]
    purpose: "Functional requirements (FR-XXX), acceptance criteria (AC-XXX), scope, roles, and non-functional requirements"
    used_by: [context-builder, validator, pdf]
    related: [test-plan, test-report, business-rules]
    pdf: true
    pdf_chapter: plan
    audience: internal
    required_sections: ["Functional Requirements", "Acceptance Criteria"]
    update_trigger: "feature added, removed, or acceptance criteria changed"

