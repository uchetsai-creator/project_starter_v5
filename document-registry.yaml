  dependencies:
    file: dependencies.md
    path: specs/dependencies.md
    required_for: []
    optional_for: [web-app, cli-tool, library, data-pipeline, ml-pipeline, microservices, llm-app, iac, mobile-app]
    context_priority: low
    purpose: "Third-party libraries, versions, licences, and update policy"
    used_by: [context-builder, pdf]
    related: [glossary]

  # ── Business ─────────────────────────────────────────────────────────────────

  business-process:
    file: business-process.md
    path: business/business-process.md
    required_for: [web-app, microservices]
    optional_for: [cli-tool, data-pipeline, mobile-app]
