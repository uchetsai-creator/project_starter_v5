  release-guide:
    file: release-guide.md
    path: specs/release-guide.md
    required_for: [cli-tool, library]
    optional_for: []
    context_priority: low
    purpose: "Versioning policy, release checklist, publish process, and deprecation policy"
    used_by: [context-builder, validator, pdf]
    related: [distribution, compatibility-matrix]

  compatibility-matrix:
    file: compatibility-matrix.md
    path: specs/compatibility-matrix.md
    required_for: [library]
    optional_for: [cli-tool, mobile-app]
    context_priority: low
    purpose: "Supported runtime versions and known incompatibilities"
    used_by: [context-builder, validator, pdf]
