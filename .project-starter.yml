# project_starter_v5 — project configuration
# Created at project initialization. Used by .githooks/pre-commit and all verify scripts.
# Do not rename this file.

project_type: [your-project-type]
# Valid values: web-app | cli-tool | library | data-pipeline | ml-pipeline
#               microservices | llm-app | iac | mobile-app
# Hybrid: data-pipeline+web-app
# ⚠️  Do not commit with [your-project-type] as-is — replace it with your actual project type.

docs_path: docs/
# Path to your docs/ directory relative to the project root.

task_type:
# Optional. Filters .ai/AI_CONTEXT.md to task-relevant documents.
# Valid values: feature | pipeline-stage | bug-fix | sprint-end | eval-run | iac-change
# Leave blank to show all Required documents for the project type.
# Can also be set per-task in docs/current-state.md → Task Type field (overrides this value).
